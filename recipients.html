<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отримувачі — Генератор QR НБУ</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
  <script src="storage.js" defer></script>
  <script src="recipients.js" defer></script>
</head>
<body>

  <symbol id="ic-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </symbol>

 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <line x1="3" y1="6"  x2="21" y2="6"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="18" x2="21" y2="18"/>
  </symbol>

  <symbol id="ic-users" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
    <circle cx="9" cy="7" r="4"/>
    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  </symbol>

  <symbol id="ic-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </symbol>

  <symbol id="ic-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    <path d="M10 11v6"/><path d="M14 11v6"/>
    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
  </symbol>

  <symbol id="ic-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/>
    <line x1="12" y1="3" x2="12" y2="15"/>
  </symbol>

  <symbol id="ic-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6 9 12 15 18 9"/>
  </symbol>

  <symbol id="ic-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
    <polyline points="15 3 21 3 21 9"/>
    <line x1="10" y1="14" x2="21" y2="3"/>
  </symbol>

  <symbol id="ic-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
    <polyline points="22 6 12 13 2 6"/>
  </symbol>

  <symbol id="ic-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.65 3.42 2 2 0 0 1 3.62 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.08 6.08l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
  </symbol>

  <symbol id="ic-telegram" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.16 14.37l-2.97-.924c-.645-.203-.658-.645.136-.953l11.57-4.461c.537-.194 1.006.131.666.216z"/>
  </symbol>
  </svg>

  <!-- Hamburger nav overlay -->
  <div class="nav-overlay" id="nav-overlay"></div>
  <nav class="nav-drawer" id="nav-drawer" aria-label="Навігація">
    <div class="nav-header">Меню</div>
    <a href="/index.html" class="nav-item">
      <i class="ti ti-home icon" aria-hidden="true"></i>
      Генератор QR
    </a>
    <a href="/recipients.html" class="nav-item nav-item--active">
      <i class="ti ti-users icon" aria-hidden="true"></i>
      Отримувачі
    </a>
  </nav>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <div class="nbu-logo" aria-hidden="true">НБУ</div>
        <div>
          <div class="topbar-title">Отримувачі</div>
          <div class="topbar-sub" id="recipients-count">Завантаження…</div>
        </div>
      </div>
      <button class="hamburger" id="hamburger-btn" aria-label="Меню" aria-expanded="false">
        <i class="ti ti-menu-2 icon icon--lg" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <main class="main">

    <!-- Toolbar -->
    <div class="r-toolbar">
      <div class="r-toolbar-top">
        <div class="search-wrap">
          <i class="ti ti-search icon search-icon" aria-hidden="true"></i>
          <input type="search" id="r-search" placeholder="Пошук по імені, IBAN, контакту, сумі…" autocomplete="off">
        </div>
      </div>
      <div class="r-toolbar-bottom">
        <div class="sort-group">
          <span class="sort-label">Сортування:</span>
          <button class="sort-btn sort-btn--active" id="sort-date" data-sort="date">За датою</button>
          <button class="sort-btn" id="sort-count" data-sort="count">За кількістю</button>
        </div>
        <div class="r-actions">
          <button class="btn-action" id="btn-import" title="Імпорт ZIP JSON">
            <i class="ti ti-upload icon" aria-hidden="true"></i>
            Імпорт
          </button>
          <button class="btn-action" id="btn-export" title="Повний експорт ZIP JSON">
            <i class="ti ti-download icon" aria-hidden="true"></i>
            Експорт ZIP
          </button>
          <button class="btn-action" id="btn-export-nocontacts" title="Експорт без контактних даних">
            <i class="ti ti-download icon" aria-hidden="true"></i>
            Без контактів
          </button>
          <input type="file" id="import-input" accept=".zip,.json" hidden>
        </div>
      </div>
    </div>

    <!-- Recipients list -->
    <div id="recipients-list"></div>

    <!-- Load more -->
    <div id="load-more-wrap" hidden style="text-align:center;margin-top:16px">
      <button class="btn-load-more" id="btn-load-more">
        Завантажити ще <span id="load-more-count"></span>
      </button>
    </div>

    <!-- No results -->
    <div class="no-results" id="no-results" hidden>
      <p>Нічого не знайдено за вашим запитом.</p>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" hidden>
      <i class="ti ti-users icon icon--empty" aria-hidden="true"></i>
      <p>Ще немає отримувачів.<br>Згенеруйте перший QR-код на головній сторінці.</p>
      <a href="/index.html" class="btn-generate" style="display:inline-flex;width:auto;padding:10px 20px;margin-top:16px;text-decoration:none">
        <i class="ti ti-qrcode icon" aria-hidden="true"></i>
        Перейти до генератора
      </a>
    </div>

  </main>

</body>
</html>
